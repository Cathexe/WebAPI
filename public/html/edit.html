<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Song</title>
<head>
    <title>Edit Song</title>
</head>
<body style="background-color: gray;text-align:center">
   <h2 style="font-family:courier; color: white;font-size:40px;">Edit Song</h2>
   <form id="editForm" style="font-family:courier; color: white;">
    <label>Song Name:</label>
    <input type="text" id="songName" name="songName" required>
    <br><br>
    <label>Artist:</label>
    <input type="text" id="artist" name="artist" required>
    <br><br>
    <button type="submit">Update Song</button>
    </form>
    <br>
    <a href="/">Go Back</a>

    <script>
        const songId = window.location.pathname.split("/").pop();
    
        // Fetch song details
        const loadSong = async () => {
            try {
                const response = await fetch(`/songs/${songId}`);
                if (!response.ok) throw new Error("Failed to fetch song details");
                const song = await response.json();
    
                document.getElementById("songName").value = song.songName;
                document.getElementById("artist").value = song.artist;
            } catch (err) {
                console.error("Error loading song:", err);
                alert("Failed to load song details");
            }
        };
    
        loadSong();
    
        // Handle form submission
        document.getElementById("editForm").addEventListener("submit", async (event) => {
            event.preventDefault();
    
            const updatedSong = {
                songName: document.getElementById("songName").value,
                artist: document.getElementById("artist").value,
            };
    
            try {
                const response = await fetch(`/updatesongs/${songId}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(updatedSong),
                });
    
                const result = await response.json();
    
                if (!response.ok) {
                    console.error("Server response:", result);
                    throw new Error(result.error || "Failed to update song");
                }
    
                alert("Song updated successfully!");
                window.location.href = "/";
            } catch (err) {
                console.error("Error updating song:", err);
                alert("Failed to update song.");
            }
        });
    </script>
 
</body>
</html>
