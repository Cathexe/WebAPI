<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogIn</title>
    <link rel="stylesheet" href = "css/style.css">
</head>
<body>
    <h1 style="font-family:courier; text-align:center; color: white;font-size:40px;">
        Register
    </h1>
    <form style="font-family:courier; text-align:center;" action="/register" method="POST">
        <label style="color: white;" for="username" >Create a username:</label>
        <input type="text" id="username" name="username" required><br>
        <label style="color: white;" for="password">Create a password:</label>
        <input type="password" id="password" name="password" required><br><br>
        <button type="submit">Register User</button>
    </form> 
    <a href="/login">Account Login</a>
</body>
</html>
