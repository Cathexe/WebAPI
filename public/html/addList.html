<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add To List</title>
    <link rel="stylesheet" href = "css/style.css">
</head>
<body>
    <h1 style="font-family:courier; text-align:center; color: white;font-size:40px;">
        Add To List
    </h1>

    <form action="/addtolist" method="POST" style="font-family:courier; text-align:center;">
        <label style="color: white;" for="songName">Song Name:</label>
        <br>
        <input type="text" id="songName" name="songName">
        <br>
        <label style="color: white;" for="artist">Artist:</label>
        <br>
        <input type="text" id="artist" name="artist">
        <br><br>
        <button type="submit">Add Song</button>
        <br>
        <a href="/">Go Back</a>
    </form> 
</body>
</html>
